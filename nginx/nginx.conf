worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # ─── Upstream pools ───────────────────────────────────────────
    upstream auth_backend {
        server auth-service:8081;
        keepalive 32;
    }

    upstream loan_backend {
        server loan-service:8082;
        keepalive 32;
    }

    upstream matching_backend {
        server matching-service:8083;
        keepalive 32;
    }

    upstream notification_backend {
        server notification-service:8084;
        keepalive 32;
    }

    upstream cms_backend {
        server cms-service:8090;
        keepalive 32;
    }

    # ─── Shared proxy headers ─────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── App API server (port 80) ─────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        location /api/auth/ {
            proxy_pass http://auth_backend;
        }

        location /api/loans/ {
            proxy_pass http://loan_backend;
        }

        location /api/matching/ {
            proxy_pass http://matching_backend;
        }

        location /api/notifications/ {
            proxy_pass http://notification_backend;
        }

        # Actuator health aggregation (internal use)
        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }
    }

    # ─── CMS server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name cms.p2plending.local;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        location / {
            proxy_pass http://cms_backend/;
        }
    }
}
