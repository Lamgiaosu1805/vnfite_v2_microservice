worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=otp_verify:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=cms_auth:10m rate=10r/m;

    # Docker's embedded DNS — re-resolve every 10s so nginx picks up
    # new container IPs after restarts without needing nginx restart
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─── Shared proxy settings ────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;

    # ─── API Gateway (port 7080 từ host) ──────────────────────────
    # Host nginx forward vào đây. Mobile app cũng gọi trực tiếp IP:7080.
    server {
        listen 80 default_server;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location = /api/auth/login {
            limit_req zone=auth_login burst=5 nodelay;
            set $backend http://auth-service:8081;
            proxy_pass $backend;
        }

        location ~ ^/api/auth/.*/verify {
            limit_req zone=otp_verify burst=10 nodelay;
            set $backend http://auth-service:8081;
            proxy_pass $backend;
        }

        location ~ ^/api/auth/(register/verify|forgot-password/verify-otp|change-password/verify|kyc/verify|devices/reset/verify)$ {
            limit_req zone=otp_verify burst=10 nodelay;
            set $backend http://auth-service:8081;
            proxy_pass $backend;
        }

        location ~ ^/api/auth/forgot-password {
            limit_req zone=auth_login burst=5 nodelay;
            set $backend http://auth-service:8081;
            proxy_pass $backend;
        }

        location ~ ^/cms/auth/ {
            limit_req zone=cms_auth burst=10 nodelay;
            set $backend http://cms-service:8090;
            proxy_pass $backend;
        }

        location /api/auth {
            set $backend http://auth-service:8081;
            proxy_pass $backend;
        }

        location /api/loans {
            set $backend http://loan-service:8082;
            proxy_pass $backend;
        }

        location /api/contracts {
            set $backend http://loan-service:8082;
            proxy_pass $backend;
        }

        location /api/matching {
            set $backend http://matching-service:8083;
            proxy_pass $backend;
        }

        location /api/notifications {
            set $backend http://notification-service:8084;
            proxy_pass $backend;
        }

        location /api/payment {
            set $backend http://payment-service:8086;
            proxy_pass $backend;
        }

        location = /notification/save-by-ms-account {
            set $backend http://payment-service:8086;
            proxy_pass $backend;
        }

        location = /transaction-management/add-transaction-by-ms-account {
            set $backend http://payment-service:8086;
            proxy_pass $backend;
        }

        location /cms {
            set $backend http://cms-service:8090;
            proxy_pass $backend;
        }

        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }
    }
}
