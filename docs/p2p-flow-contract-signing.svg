<text x="100" y="1576.0" font-size="14.5" font-weight="700" fill="#0F172A">Hợp đồng ĐẦU TƯ — ký bởi NHÀ ĐẦU TƯ (OTP), tại bước 5 khi rót vốn.</text>
<text x="100" y="1598.0" font-size="13" fill="#64748B">Mỗi nhà đầu tư ký 1 hợp đồng cho phần vốn của mình. Đối ứng (bên còn lại) là VNFITE đại diện kết nối.</text>
