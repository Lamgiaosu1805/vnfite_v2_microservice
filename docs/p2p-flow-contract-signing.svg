<text x="640" y="56" text-anchor="middle" font-size="28" font-weight="700" fill="#0F172A">VNFITE P2P — Luồng gọi vốn → giải ngân &amp; điểm ký hợp đồng</text>
<text x="640" y="86" text-anchor="middle" font-size="15" fill="#64748B">Ký hợp đồng điện tử bằng OTP (mock VNPT eContract) · 2 điểm ký · đối ứng các HĐ là VNFITE (nền tảng)</text>
<text x="640" y="112" text-anchor="middle" font-size="13" fill="#94A3B8">PENDING_REVIEW → PENDING_APPROVAL → AWAITING_BORROWER_APPROVAL → ACTIVE → FUNDED → AWAITING_DISBURSEMENT → DISBURSED → REPAYING</text>
