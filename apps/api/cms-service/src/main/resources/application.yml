spring:
  application:
    name: cms-service
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${CMS_DB:cms_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
server:
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

cms:
  jwt:
    secret: ${CMS_JWT_SECRET:dev-only-cms-jwt-secret-change-me-at-least-32-bytes}
    access-token-expiry: ${CMS_ACCESS_TOKEN_EXPIRY:86400}  # 24 giờ
  admin:
    username: ${CMS_ADMIN_USERNAME:admin}
    password: ${CMS_ADMIN_PASSWORD:Admin@123456}
    email: ${CMS_ADMIN_EMAIL:admin@p2plending.local}
    full-name: ${CMS_ADMIN_FULL_NAME:CMS Administrator}
  sources:
    auth-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
    loan-url: ${LOAN_SERVICE_URL:http://loan-service:8082}
    payment-url: ${PAYMENT_SERVICE_URL:http://payment-service:8086}
    credit-url: ${CREDIT_SERVICE_URL:http://credit-service:8087}
    internal-secret: ${INTERNAL_API_SECRET}

push:
  notification:
    base-url: ${PUSH_NOTIFICATION_URL:https://service.vnfite.com.vn/push-notification/v2/notification}
    alias: ${PUSH_NOTIFICATION_ALIAS:vnfite}

file:
  manager:
    base-url: ${FILE_MANAGER_URL:https://service.vnfite.com.vn/file-manager/v2/file}

app:
  redis:
    namespace: ${APP_REDIS_NAMESPACE:${SPRING_PROFILES_ACTIVE:dev}}:cms-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.p2plending.cms: DEBUG
