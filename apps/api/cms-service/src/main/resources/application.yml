spring:
  application:
    name: cms-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${CUSTOMER_DB:customer_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: cms-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

server:
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

cms:
  jwt:
    secret: ${CMS_JWT_SECRET:dev-only-cms-jwt-secret-change-me-at-least-32-bytes}
    access-token-expiry: ${CMS_ACCESS_TOKEN_EXPIRY:28800}
  admin:
    username: ${CMS_ADMIN_USERNAME:admin}
    password: ${CMS_ADMIN_PASSWORD:Admin@123456}
    email: ${CMS_ADMIN_EMAIL:admin@p2plending.local}
    full-name: ${CMS_ADMIN_FULL_NAME:CMS Administrator}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.p2plending.cms: DEBUG
