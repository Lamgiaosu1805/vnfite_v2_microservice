spring:
  application:
    name: credit-service

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${CREDIT_DB:credit_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

server:
  port: 8087
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

app:
  internal:
    secret: ${INTERNAL_API_SECRET}
  scoring:
    # Phiên bản model chấm điểm — lưu kèm mỗi credit_score để trace
    model-version: scorecard-v1.0
    # Điểm có hiệu lực bao nhiêu ngày trước khi phải chấm lại
    score-ttl-days: 90
  ai:
    # AI risk assessment — chỉ mang tính tư vấn cho admin thẩm định,
    # không bao giờ tự quyết định duyệt/từ chối.
    # enabled=false  → tắt hoàn toàn (mock trả null)
    # enabled=true + mode=demo  → fake realistic, không cần API key (dùng để test UI)
    # enabled=true + mode=claude → gọi Claude API thật (cần ANTHROPIC_API_KEY)
    enabled: ${APP_AI_ENABLED:false}
    # demo = fake data nhưng có cấu trúc đầy đủ, không cần API key — dùng để test UI
    # gemini = Gemini Flash thật, cần GEMINI_API_KEY (miễn phí tại aistudio.google.com/apikey)
    # claude = Claude API thật, cần ANTHROPIC_API_KEY
    mode: ${APP_AI_MODE:demo}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${APP_AI_MODEL:claude-opus-4-8}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-3.1-flash-lite}

# File-manager dùng chung của VNFITE — nơi lưu file chứng từ gốc
file-manager:
  base-url: ${FILE_MANAGER_URL:https://service.vnfite.com.vn/file-manager/v2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.p2plending.credit: DEBUG
