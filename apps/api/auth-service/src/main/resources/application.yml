spring:
  application:
    name: auth-service

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${AUTH_DB:auth_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 300000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

# JWT RS256 config
# Set RSA_PRIVATE_KEY / RSA_PUBLIC_KEY env vars in production (PKCS8/X509 base64, PEM headers optional)
# If left empty an ephemeral key pair is generated at startup (dev only — tokens don't survive restart)
jwt:
  private-key: ${RSA_PRIVATE_KEY:}
  public-key: ${RSA_PUBLIC_KEY:}
  issuer: ${JWT_ISSUER:vnfite-auth}
  audience: ${JWT_AUDIENCE:vnfite-api}
  access-token-expiry: 300       # seconds — 5 minutes
  refresh-token-expiry: 600      # seconds — 10 minutes

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  demo:
    # userId của Apple review account — ẩn khỏi CMS user list và stats
    excluded-user-ids: ${DEMO_EXCLUDED_USER_IDS:}
  otp:
    mock: false
  image-storage:
    # mock (mặc định) | file-manager (live: upload ảnh KYC thật lên file-manager)
    provider: ${APP_IMAGE_STORAGE_PROVIDER:mock}
  vnf-otp:
    url: ${VNF_OTP_SERVICE_URL:}
    path: ${VNF_OTP_SERVICE_PATH:/common/generate-otp-app-v2}
  vnpt-ekyc:
    token-url: ${VNPT_EKYC_TOKEN_URL:https://api.idg.vnpt.vn/auth/oauth/token}
    username: ${VNPT_EKYC_USERNAME:}
    password: ${VNPT_EKYC_PASSWORD:}
    token-id: ${VNPT_EKYC_TOKEN_ID:}
    token-key: ${VNPT_EKYC_TOKEN_KEY:}
    client-id: ${VNPT_EKYC_CLIENT_ID:adminapp}
    client-secret: ${VNPT_EKYC_CLIENT_SECRET:password}
  redis:
    namespace: ${APP_REDIS_NAMESPACE:${SPRING_PROFILES_ACTIVE:dev}}:auth-service
  internal:
    secret: ${INTERNAL_API_SECRET}
  store:
    android:
      min-version: ${APP_MIN_VERSION_ANDROID:1.0.0}
      store-url: ${APP_STORE_URL_ANDROID:https://play.google.com/store/apps/details?id=com.vnfite.vnfiteapp}
    ios:
      min-version: ${APP_MIN_VERSION_IOS:1.0.0}
      store-url: ${APP_STORE_URL_IOS:https://apps.apple.com/vn/app/vnfite-fintech-p2p-lending/id1610082008?l=vi}

logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
