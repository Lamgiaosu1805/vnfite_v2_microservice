spring:
  application:
    name: payment-service

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${PAYMENT_DB:payment_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

server:
  port: 8086
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

jwt:
  public-key: ${RSA_PUBLIC_KEY:}
  issuer: ${JWT_ISSUER:vnfite-auth}
  audience: ${JWT_AUDIENCE:vnfite-api}

app:
  redis:
    namespace: ${APP_REDIS_NAMESPACE:${SPRING_PROFILES_ACTIVE:dev}}:payment-service
  internal:
    secret: ${INTERNAL_API_SECRET}
  otp:
    mock: ${APP_OTP_MOCK:true}
    max-fail-attempts: 5
  payment:
    # mock=true: bỏ qua TIKLUY, dùng dữ liệu giả cho môi trường dev/test
    mock: ${APP_PAYMENT_MOCK:true}
  auth:
    service-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  vnf-otp:
    url: ${VNF_OTP_SERVICE_URL:}
    withdrawal-function-type: 2
  tikluy:
    internal-secret: ${TIKLUY_INTERNAL_SECRET:}
    callback:
      secret: ${TIKLUY_CALLBACK_SECRET:}
      allowed-ips: ${TIKLUY_CALLBACK_ALLOWED_IPS:}

tikluy:
  # ⚠️ Mặc định trỏ TEST để tránh chạm tiền thật.
  # Test (42.113.122.119): port 9999 (IS_PROD=N, MB sandbox — KHÔNG chạm tiền thật)
  # Live (42.113.122.155): port 8888 (IS_PROD=Y, MB Bank THẬT — chỉ dùng khi go-production)
  base-url: ${TIKLUY_BASE_URL:http://42.113.122.119:9999}
  client-id: ${TIKLUY_CLIENT_ID:VF-NSK3SDF}
  client-secret: ${TIKLUY_CLIENT_SECRET:2tzMGst67sZfXqmx68TxnQUzyriBti}
  # Nguồn tạo VA: VNFITE → prefix VNF, VNFFITE_CAPITAL → prefix VNC
  source: ${TIKLUY_SOURCE:VNFITE}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.p2plending.payment: DEBUG
