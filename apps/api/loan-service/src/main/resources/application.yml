spring:
  application:
    name: loan-service

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${LOAN_DB:loan_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: loan-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes in ms

server:
  port: 8082
  tomcat:
    max-http-form-post-size: 20MB
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

# JWT: only public key needed — loan-service validates but never issues tokens
jwt:
  public-key: ${RSA_PUBLIC_KEY:}
  issuer: ${JWT_ISSUER:vnfite-auth}
  audience: ${JWT_AUDIENCE:vnfite-api}

file-manager:
  base-url: ${FILE_MANAGER_URL:https://service.vnfite.com.vn/file-manager/v2}

app:
  demo:
    # userId của Apple review account — trả loan list rỗng, stats = 0
    excluded-user-ids: ${DEMO_EXCLUDED_USER_IDS:}
  otp:
    mock: ${APP_OTP_MOCK:true}
  vnf-otp:
    url: ${VNF_OTP_SERVICE_URL:}
    path: ${VNF_OTP_SERVICE_PATH:/common/generate-otp-app-v2}
    loan-function-type: ${VNF_OTP_LOAN_FUNCTION_TYPE:7}
    contract-function-type: ${VNF_OTP_CONTRACT_FUNCTION_TYPE:2}
  redis:
    namespace: ${APP_REDIS_NAMESPACE:${SPRING_PROFILES_ACTIVE:dev}}:loan-service
  internal:
    secret: ${INTERNAL_API_SECRET}
  news:
    image-dir: ${APP_NEWS_IMAGE_DIR:/var/www/html/images/news}
    public-base: ${APP_NEWS_PUBLIC_BASE:http://localhost:7080}
  job:
    image-dir: ${APP_JOB_IMAGE_DIR:/var/www/html/images/jobs}
    public-base: ${APP_JOB_PUBLIC_BASE:http://localhost:7080}
    cv-dir: ${APP_JOB_CV_DIR:/var/data/job-applications/cv}
  antivirus:
    enabled: ${APP_AV_ENABLED:false}
    host: ${APP_CLAMAV_HOST:clamav}
    port: ${APP_CLAMAV_PORT:3310}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  payment-service:
    base-url: ${PAYMENT_SERVICE_URL:http://payment-service:8086}
  dpd:
    # Số ngày quá hạn (DPD) → tự đánh khoản vay sang DEFAULTED
    default-threshold: ${APP_DPD_THRESHOLD:30}
    # Cron quét DPD hằng ngày (giờ Việt Nam)
    cron: ${APP_DPD_CRON:0 0 1 * * *}
  auto-debit:
    # Quét thu nợ tự động nhiều lần trong ngày để bắt kịp khách nạp tiền sau lượt quét đầu.
    cron: ${APP_AUTO_DEBIT_CRON:0 45 0,10,15,22 * * *}
  repayment-reminder:
    # Nhắc người gọi vốn chuẩn bị số dư trước ngày đến hạn, không trừ tiền.
    days-ahead: ${APP_REPAYMENT_REMINDER_DAYS_AHEAD:1}
    cron: ${APP_REPAYMENT_REMINDER_CRON:0 0 8 * * *}
  funding:
    # Số ngày khoản được phép ở ACTIVE để gọi vốn trước khi hết hạn & hoàn tiền nhà đầu tư
    window-days: ${APP_FUNDING_WINDOW_DAYS:180}
    # Số ngày người gọi vốn được phép ký khế ước sau khi FUNDED trước khi hủy & hoàn tiền
    signing-window-days: ${APP_FUNDING_SIGNING_WINDOW_DAYS:7}
    # Cron quét hết hạn gọi vốn / ký khế ước hằng ngày (giờ Việt Nam)
    expiry-cron: ${APP_FUNDING_EXPIRY_CRON:0 30 1 * * *}
  appraisal:
    # Trần tỷ lệ trả nợ trên thu nhập (Payment-to-Income) khi tính số tiền đề xuất
    pti-cap: ${APP_APPRAISAL_PTI_CAP:0.40}
    # Lãi tham chiếu (%/năm) để ước lượng PTI khi chấm điểm (độc lập với hạng)
    reference-rate: ${APP_APPRAISAL_REFERENCE_RATE:19.0}
    # Điều 3 — phụ phí lĩnh vực không khuyến khích (+%/năm)
    discouraged-surcharge: ${APP_APPRAISAL_DISCOURAGED_SURCHARGE:2.0}
    # Trần lãi suất theo pháp luật / biểu QĐ-LSGV (%/năm)
    legal-max-rate: ${APP_APPRAISAL_LEGAL_MAX_RATE:20.0}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.p2plending.loan: DEBUG
