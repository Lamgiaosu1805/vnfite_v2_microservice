spring:
  application:
    name: matching-service

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MATCHING_DB:matching_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD:p2p_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: matching-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

spring.servlet.multipart:
  max-file-size: 30MB
  max-request-size: 30MB

server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

jwt:
  public-key: ${RSA_PUBLIC_KEY:}
  issuer: ${JWT_ISSUER:vnfite-auth}
  audience: ${JWT_AUDIENCE:vnfite-api}

matching:
  min-score-threshold: 0.60   # minimum match score 0.0-1.0
  max-matches-per-loan: 10    # cap on matches published per loan
  rematching-cron: "0 */30 * * * *"   # every 30 minutes

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.p2plending.matching: DEBUG
