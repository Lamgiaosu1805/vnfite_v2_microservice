spring:
  application:
    name: fec-integration-service
  jackson:
    time-zone: Asia/Ho_Chi_Minh

spring.servlet.multipart:
  max-file-size: 30MB
  max-request-size: 30MB

server:
  port: 8091
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force-response: true

app:
  internal:
    secret: ${INTERNAL_API_SECRET}
  fec:
    enabled: ${APP_FEC_ENABLED:true}
    receive-lead-url: ${APP_FEC_RECEIVE_LEAD_URL:https://uat-whitelist-gw.ubank.vn/wl/fe2/api/v2/feol/receive-leads}
    partner-code: ${APP_FEC_PARTNER_CODE:VNFITE}
    lead-source: ${APP_FEC_LEAD_SOURCE:VNFITE}
    bearer-token: ${APP_FEC_BEARER_TOKEN:}
    partner-private-key: ${APP_FEC_PARTNER_PRIVATE_KEY:}
    partner-public-key: ${APP_FEC_PARTNER_PUBLIC_KEY:}
    fec-public-key: ${APP_FEC_PUBLIC_KEY:}
    callback-api-key: ${APP_FEC_CALLBACK_API_KEY:}
    connect-timeout-ms: ${APP_FEC_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${APP_FEC_READ_TIMEOUT_MS:30000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.p2plending.fec: DEBUG
