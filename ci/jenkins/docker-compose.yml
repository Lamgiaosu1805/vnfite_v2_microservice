services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${P2P_REPO_DIR:?Set P2P_REPO_DIR to the absolute repository path}:${P2P_REPO_DIR:?Set P2P_REPO_DIR to the absolute repository path}
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
      P2P_REPO_DIR: ${P2P_REPO_DIR:?Set P2P_REPO_DIR to the absolute repository path}

volumes:
  jenkins_home:
