when:
  - branch: main
    path:
      include:
        - "nginx/**"

steps:
  - name: reload-nginx
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: server_host
      username:
        from_secret: server_user
      key:
        from_secret: server_ssh_key
      script:
        - cd ~/p2p-lending
        - git pull origin main
        - docker compose restart nginx
        - echo "nginx reloaded"
