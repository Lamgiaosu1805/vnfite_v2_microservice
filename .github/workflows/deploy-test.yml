name: Deploy to Test Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: lamgiaosu1805/vnfite_v2_microservice

jobs:
  # ─── Job 1: Build & push tất cả 5 Docker images ─────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api/auth-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/auth-service:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/auth-service:${{ github.sha }}
          cache-from: type=gha,scope=auth-service
          cache-to: type=gha,scope=auth-service,mode=max

      - name: Build & push loan-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api/loan-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/loan-service:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/loan-service:${{ github.sha }}
          cache-from: type=gha,scope=loan-service
          cache-to: type=gha,scope=loan-service,mode=max

      - name: Build & push matching-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api/matching-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/matching-service:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/matching-service:${{ github.sha }}
          cache-from: type=gha,scope=matching-service
          cache-to: type=gha,scope=matching-service,mode=max

      - name: Build & push cms-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api/cms-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/cms-service:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/cms-service:${{ github.sha }}
          cache-from: type=gha,scope=cms-service
          cache-to: type=gha,scope=cms-service,mode=max

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api/notification-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/notification-service:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/notification-service:${{ github.sha }}
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,scope=notification-service,mode=max

  # ─── Job 2: Deploy lên server test ───────────────────────────────
  deploy:
    name: Deploy to Test Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/p2p-lending

            # Lấy code mới nhất (docker-compose.yml, nginx config, v.v.)
            git pull origin main

            # Pull images mới từ ghcr.io (infra giữ nguyên, không restart)
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull auth-service loan-service matching-service cms-service notification-service

            # Restart chỉ app services
            docker compose up -d --no-build \
              auth-service loan-service matching-service cms-service notification-service nginx

            # Dọn dẹp images cũ
            docker image prune -f

            echo "Deploy OK — commit ${{ github.sha }}"
