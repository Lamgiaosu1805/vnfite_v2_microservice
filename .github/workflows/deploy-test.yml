name: CI/CD → Test Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Deploy tất cả services (dùng khi lần đầu hoặc cần reset)'
        type: boolean
        default: false

env:
  SERVER: root@42.113.122.119
  APP_DIR: /root/p2p-lending
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate Flyway migrations (no duplicate versions)
        run: |
          FAIL=0
          for dir in apps/api/*/src/main/resources/db/migration; do
            [ -d "$dir" ] || continue
            service=$(echo "$dir" | cut -d'/' -f3)
            duplicates=$(ls "$dir"/V*.sql 2>/dev/null \
              | sed 's|.*/V\([0-9]*\)__.*|\1|' \
              | sort | uniq -d)
            if [ -n "$duplicates" ]; then
              echo "❌ $service: duplicate Flyway version(s): $duplicates"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "Fix: đổi tên file migration sang version tiếp theo chưa dùng."
            exit 1
          fi
          echo "✅ Không có version Flyway trùng"

      - name: Detect changed services
        id: changes
        run: |
          FORCE="${{ inputs.force_all }}"
          if [ "$FORCE" = "true" ]; then
            echo "Forcing deploy all services"
            echo "auth=true"         >> $GITHUB_OUTPUT
            echo "loan=true"         >> $GITHUB_OUTPUT
            echo "matching=true"     >> $GITHUB_OUTPUT
            echo "cms=true"          >> $GITHUB_OUTPUT
            echo "credit=true"       >> $GITHUB_OUTPUT
            echo "payment=true"      >> $GITHUB_OUTPUT
            echo "notification=true" >> $GITHUB_OUTPUT
            echo "nginx=true"        >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            echo "=== Changed files ==="
            echo "$CHANGED"
            echo "auth=$(echo "$CHANGED"         | grep -q 'apps/api/auth-service/'         && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "loan=$(echo "$CHANGED"         | grep -q 'apps/api/loan-service/'         && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "matching=$(echo "$CHANGED"     | grep -q 'apps/api/matching-service/'     && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "cms=$(echo "$CHANGED"          | grep -q 'apps/api/cms-service/'          && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "credit=$(echo "$CHANGED"        | grep -q 'apps/api/credit-service/'       && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "payment=$(echo "$CHANGED"       | grep -q 'apps/api/payment-service/'      && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "notification=$(echo "$CHANGED" | grep -q 'apps/api/notification-service/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "nginx=$(echo "$CHANGED"        | grep -q 'nginx/'                         && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        env:
          SSH_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_TEST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$SSH_KEY_B64" | tr -d ' \n\r' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 42.113.122.119 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync .env to server
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE_TEST }}
        run: |
          printf '%s' "$ENV_CONTENT" > /tmp/.env_test
          scp -i ~/.ssh/deploy_key /tmp/.env_test ${{ env.SERVER }}:${{ env.APP_DIR }}/.env
          rm -f /tmp/.env_test

      - name: Deploy auth-service
        if: steps.changes.outputs.auth == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build auth-service; docker compose up -d auth-service; docker image prune -f'

      - name: Deploy loan-service
        if: steps.changes.outputs.loan == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build loan-service; docker compose up -d loan-service; docker image prune -f'

      - name: Deploy matching-service
        if: steps.changes.outputs.matching == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build matching-service; docker compose up -d matching-service; docker image prune -f'

      - name: Deploy cms-service
        if: steps.changes.outputs.cms == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build cms-service; docker compose up -d cms-service; docker image prune -f'

      - name: Deploy credit-service
        if: steps.changes.outputs.credit == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build credit-service; docker compose up -d credit-service; docker image prune -f'

      - name: Deploy payment-service
        if: steps.changes.outputs.payment == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build payment-service; docker compose up -d payment-service; docker image prune -f'

      - name: Deploy notification-service
        if: steps.changes.outputs.notification == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose build notification-service; docker compose up -d notification-service; docker image prune -f'

      - name: Reload nginx
        if: steps.changes.outputs.nginx == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; git fetch origin main; git reset --hard origin/main; docker compose up -d nginx'

      - name: Reset Redis cache
        if: steps.changes.outputs.auth == 'true' || steps.changes.outputs.loan == 'true' || steps.changes.outputs.matching == 'true' || steps.changes.outputs.cms == 'true' || steps.changes.outputs.credit == 'true' || steps.changes.outputs.payment == 'true' || steps.changes.outputs.notification == 'true' || steps.changes.outputs.nginx == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER }} \
            'set -e; cd /root/p2p-lending; sh infra/scripts/reset-redis-cache.sh'

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/.env_test
