services:
  # ─── Infrastructure ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: p2p-mysql
    # Không expose port ra host để tránh conflict với MySQL native trên server
    # App services kết nối qua Docker network dùng hostname "mysql"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-p2p_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-p2p_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: p2p-redis
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:?REDIS_PASSWORD is required}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: p2p-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: p2p-kafka
#    ports:
#      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - p2p-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Application Services ─────────────────────────────────────
  auth-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/auth-service
      dockerfile: Dockerfile
    container_name: p2p-auth-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      AUTH_DB: ${AUTH_DB:-auth_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY:-}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      APP_OTP_MOCK: ${APP_OTP_MOCK:-false}
      VNF_OTP_SERVICE_URL: ${VNF_OTP_SERVICE_URL:-}
      VNF_OTP_SERVICE_PATH: ${VNF_OTP_SERVICE_PATH:-/common/generate-otp-app-v2}
      DEMO_EXCLUDED_USER_IDS: ${DEMO_EXCLUDED_USER_IDS:-}
      # VNPT eKYC — backend lấy token, app không giữ username/password
      VNPT_EKYC_TOKEN_URL: ${VNPT_EKYC_TOKEN_URL:-https://api.idg.vnpt.vn/auth/oauth/token}
      VNPT_EKYC_USERNAME: ${VNPT_EKYC_USERNAME:-}
      VNPT_EKYC_PASSWORD: ${VNPT_EKYC_PASSWORD:-}
      VNPT_EKYC_TOKEN_ID: ${VNPT_EKYC_TOKEN_ID:-}
      VNPT_EKYC_TOKEN_KEY: ${VNPT_EKYC_TOKEN_KEY:-}
      # Ảnh KYC: live đặt file-manager để upload thật & lấy fileId
      APP_IMAGE_STORAGE_PROVIDER: ${APP_IMAGE_STORAGE_PROVIDER:-mock}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-https://service.vnfite.com.vn/file-manager/v2}
      APP_MIN_VERSION_IOS: ${APP_MIN_VERSION_IOS:-1.5.7}
      APP_MIN_VERSION_ANDROID: ${APP_MIN_VERSION_ANDROID:-1.5.7}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # VWork CRM
      VWORK_URL: ${VWORK_URL}
      VWORK_API_KEY: ${VWORK_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  loan-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/loan-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/loan-service
      dockerfile: Dockerfile
    container_name: p2p-loan-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      LOAN_DB: ${LOAN_DB:-loan_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CMS_JWT_SECRET: ${CMS_JWT_SECRET:-dev-only-cms-jwt-secret-change-me-at-least-32-bytes}
      CMS_ACCESS_TOKEN_EXPIRY: ${CMS_ACCESS_TOKEN_EXPIRY:-28800}
      CMS_ADMIN_USERNAME: ${CMS_ADMIN_USERNAME:-admin}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:-Admin@123456}
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-admin@p2plending.local}
      CMS_ADMIN_FULL_NAME: ${CMS_ADMIN_FULL_NAME:-CMS Administrator}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      APP_OTP_MOCK: ${APP_OTP_MOCK:-true}
      VNF_OTP_SERVICE_URL: ${VNF_OTP_SERVICE_URL:-}
      VNF_OTP_SERVICE_PATH: ${VNF_OTP_SERVICE_PATH:-/common/generate-otp-app-v2}
      VNF_OTP_LOAN_FUNCTION_TYPE: ${VNF_OTP_LOAN_FUNCTION_TYPE:-7}
      VNF_OTP_CONTRACT_FUNCTION_TYPE: ${VNF_OTP_CONTRACT_FUNCTION_TYPE:-2}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      APP_NEWS_IMAGE_DIR: ${APP_NEWS_IMAGE_DIR:-/var/www/html/images/news}
      APP_NEWS_PUBLIC_BASE: ${APP_NEWS_PUBLIC_BASE:-http://localhost:7080}
      APP_JOB_IMAGE_DIR: ${APP_JOB_IMAGE_DIR:-/var/www/html/images/jobs}
      APP_JOB_PUBLIC_BASE: ${APP_JOB_PUBLIC_BASE:-http://localhost:7080}
      APP_JOB_CV_DIR: ${APP_JOB_CV_DIR:-/var/data/job-applications/cv}
      DEMO_EXCLUDED_USER_IDS: ${DEMO_EXCLUDED_USER_IDS:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      - /var/www/html/images:/var/www/html/images
      - job_cv_data:/var/data/job-applications/cv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  matching-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/matching-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/matching-service
      dockerfile: Dockerfile
    container_name: p2p-matching-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MATCHING_DB: ${MATCHING_DB:-matching_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  cms-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/cms-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/cms-service
      dockerfile: Dockerfile
    container_name: p2p-cms-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      CMS_DB: ${CMS_DB:-cms_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      LOAN_SERVICE_URL: ${LOAN_SERVICE_URL:-http://loan-service:8082}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8086}
      CREDIT_SERVICE_URL: ${CREDIT_SERVICE_URL:-http://credit-service:8087}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8084}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      PUSH_NOTIFICATION_URL: ${PUSH_NOTIFICATION_URL:-https://service.vnfite.com.vn/push-notification/v2/notification}
      PUSH_NOTIFICATION_ALIAS: ${PUSH_NOTIFICATION_ALIAS:-vnfite}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-https://service.vnfite.com.vn/file-manager/v2/file}
      APP_TOTP_REQUIRED: ${APP_TOTP_REQUIRED:-true}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  fec-integration-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/fec-integration-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/fec-integration-service
      dockerfile: Dockerfile
    container_name: p2p-fec-integration-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      APP_FEC_ENABLED: ${APP_FEC_ENABLED:-true}
      APP_FEC_RECEIVE_LEAD_URL: ${APP_FEC_RECEIVE_LEAD_URL:-https://uat-whitelist-gw.ubank.vn/wl/fe2/api/v2/feol/receive-leads}
      APP_FEC_PARTNER_CODE: ${APP_FEC_PARTNER_CODE:-VNFITE}
      APP_FEC_LEAD_SOURCE: ${APP_FEC_LEAD_SOURCE:-VNFITE}
      APP_FEC_BEARER_TOKEN: ${APP_FEC_BEARER_TOKEN:-}
      APP_FEC_PARTNER_PRIVATE_KEY: ${APP_FEC_PARTNER_PRIVATE_KEY:-}
      APP_FEC_PARTNER_PUBLIC_KEY: ${APP_FEC_PARTNER_PUBLIC_KEY:-}
      APP_FEC_PUBLIC_KEY: ${APP_FEC_PUBLIC_KEY:-}
      APP_FEC_CALLBACK_API_KEY: ${APP_FEC_CALLBACK_API_KEY:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - p2p-network
    restart: on-failure

  notification-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/notification-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/notification-service
      dockerfile: Dockerfile
    container_name: p2p-notification-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      NOTIFICATION_DB: ${NOTIFICATION_DB:-notification_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  payment-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/payment-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/payment-service
      dockerfile: Dockerfile
    container_name: p2p-payment-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      PAYMENT_DB: ${PAYMENT_DB:-payment_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY:-}
      APP_REDIS_NAMESPACE: ${APP_REDIS_NAMESPACE:-dev}
      APP_PAYMENT_MOCK: ${APP_PAYMENT_MOCK:-true}
      APP_OTP_MOCK: ${APP_OTP_MOCK:-true}
      VNF_OTP_SERVICE_URL: ${VNF_OTP_SERVICE_URL:-}
      # ⚠️ Mặc định TEST (119:9999, MB sandbox) để tránh chạm tiền thật; live = 155:8888
      TIKLUY_BASE_URL: ${TIKLUY_BASE_URL:-http://42.113.122.119:9999}
      TIKLUY_CLIENT_ID: ${TIKLUY_CLIENT_ID:-VF-NSK3SDF}
      TIKLUY_CLIENT_SECRET: ${TIKLUY_CLIENT_SECRET:-2tzMGst67sZfXqmx68TxnQUzyriBti}
      TIKLUY_SOURCE: ${TIKLUY_SOURCE:-VNFITE}
      TIKLUY_INTERNAL_SECRET: ${TIKLUY_INTERNAL_SECRET:-}
      TIKLUY_CALLBACK_SECRET: ${TIKLUY_CALLBACK_SECRET:-}
      TIKLUY_CALLBACK_ALLOWED_IPS: ${TIKLUY_CALLBACK_ALLOWED_IPS:-42.113.122.155,127.0.0.1}
      APP_RECON_AUTO_DEPOSIT_FIX_ENABLED: ${APP_RECON_AUTO_DEPOSIT_FIX_ENABLED:-false}
      APP_RECON_TIKLUY_DB_HOST: ${APP_RECON_TIKLUY_DB_HOST:-}
      APP_RECON_TIKLUY_DB_PORT: ${APP_RECON_TIKLUY_DB_PORT:-3306}
      APP_RECON_TIKLUY_DB_NAME: ${APP_RECON_TIKLUY_DB_NAME:-VNF_ACCOUNT_MANAGEMENT}
      APP_RECON_TIKLUY_DB_USERNAME: ${APP_RECON_TIKLUY_DB_USERNAME:-}
      APP_RECON_TIKLUY_DB_PASSWORD: ${APP_RECON_TIKLUY_DB_PASSWORD:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
