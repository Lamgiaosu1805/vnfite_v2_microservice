  credit-service:
    image: ${GHCR_REGISTRY:-ghcr.io/lamgiaosu1805/vnfite_v2_microservice}/credit-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/api/credit-service
      dockerfile: Dockerfile
    container_name: p2p-credit-service
    environment:
      TZ: Asia/Ho_Chi_Minh
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Ho_Chi_Minh
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      CREDIT_DB: ${CREDIT_DB:-credit_db}
      DB_USERNAME: ${DB_USERNAME:-p2p_user}
      DB_PASSWORD: ${DB_PASSWORD:-p2p_pass}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      APP_AI_ENABLED: ${APP_AI_ENABLED:-false}
      APP_AI_MODE: ${APP_AI_MODE:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      APP_AI_MODEL: ${APP_AI_MODEL:-claude-opus-4-8}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      FILE_MANAGER_URL: ${FILE_MANAGER_URL:-https://service.vnfite.com.vn/file-manager/v2}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - p2p-network
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - p2p-network
    restart: unless-stopped

  # ─── Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: p2p-nginx
    ports:
      - "7080:80"  # API gateway — mobile app & host nginx forward vào đây
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/html/images:/var/www/html/images:ro
    depends_on:
      - auth-service
      - loan-service
      - matching-service
      - cms-service
      - fec-integration-service
      - notification-service
      - payment-service
    networks:
      - p2p-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  job_cv_data:

networks:
  p2p-network:
    driver: bridge
